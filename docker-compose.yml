services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: "San Dauk Lay"
      APP_ENV: local
      APP_KEY: base64:Q3mJbL+gQk7i0s8qPiaBI6eqQu57T5aQf2Vy1m7HcFE=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      ADMIN_EMAILS: admin@sandauklay.test
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/var/www/html/storage/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
